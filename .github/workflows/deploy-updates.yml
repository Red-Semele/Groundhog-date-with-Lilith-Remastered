name: Deploy Update Packages to GitHub Pages

# Run this manually AFTER you have:
#   1. Built the update package with Ren'Py's launcher (Distribute → Update)
#   2. Uploaded updates.json and GdwL4R-*.update.bz2 to the GitHub Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to deploy (e.g. v1.1)"
        required: true
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # ── 1. Download update assets from the GitHub Release ──────────────────
      - name: Download release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Looking for release: ${{ inputs.release_tag }}"
          echo "Repo: ${{ github.repository }}"

          # Normalise: ensure the tag always has a leading "v"
          RAW="${{ inputs.release_tag }}"
          TAG="${RAW#v}"   # strip any existing v
          TAG="v${TAG}"   # always add v
          echo "Normalised tag: $TAG"

          echo "=== Available releases ==="
          gh release list --repo "${{ github.repository }}" || echo "(gh release list failed)"

          mkdir -p site/updates _dl
          gh release download "$TAG" \
            --repo "${{ github.repository }}" \
            --pattern "updates.zip" \
            --dir _dl

          echo "Downloaded files:"
          ls -lh _dl/

          # Extract zip preserving the rpu/ subfolder
          unzip -o _dl/updates.zip -d site/updates/
          rm -rf _dl

          echo "Staged update files:"
          find site/updates/ -type f | head -40

          # Minimal index so the site root isn't empty
          echo "<html><body>GdwL4R update server</body></html>" > site/index.html

      # ── 2. Upload the site folder as a Pages artifact ──────────────────────
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

      # ── 3. Deploy to GitHub Pages ───────────────────────────────────────────
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Summary
        run: |
          echo "✅ Update packages live at:"
          echo "   ${{ steps.deployment.outputs.page_url }}updates/"
